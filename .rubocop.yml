AllCops:
  TargetRubyVersion: 3.1.4

Style/StringLiterals:
  Enabled: true
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  Enabled: true
  EnforcedStyle: double_quotes

Layout/LineLength:
  Max: 120

Metrics/BlockLength:
  Exclude:
    - "spec/**/*"

Style/Documentation:
  Enabled: false

Metrics/ParameterLists:
  Exclude:
    - "lib/jp_prefecture/prefecture.rb"

Metrics/MethodLength:
  Exclude:
    - "lib/jp_prefecture/prefecture.rb"

Style/EmptyElse:
  EnforcedStyle: empty
